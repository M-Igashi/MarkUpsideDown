name: PR Check

on:
  pull_request:
    types: [opened, edited, reopened]

permissions:
  pull-requests: read

jobs:
  check-issue-link:
    name: Require linked issue
    runs-on: ubuntu-latest
    steps:
      - name: Check for issue reference
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$PR_BODY" ]; then
            echo "::error::PR description is empty. Every PR must reference an issue (e.g., 'Closes #123')."
            exit 1
          fi

          # Match common issue-linking keywords followed by #number
          # See: https://docs.github.com/en/issues/tracking-your-work-with-issues/using-issues/linking-a-pull-request-to-an-issue
          if echo "$PR_BODY" | grep -qiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+'; then
            echo "Issue reference found."
          else
            echo "::error::No linked issue found. Every PR must reference an issue using 'Closes #<number>' in the description. See CONTRIBUTING.md for details."
            exit 1
          fi
